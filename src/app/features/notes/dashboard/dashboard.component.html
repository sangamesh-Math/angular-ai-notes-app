<div class="space-y-6 max-w-7xl">

  <div>
    <h1 class="text-4xl font-bold">
      Dashboard
    </h1>

    <p class="text-slate-400 mt-2">
      Manage your notes efficiently.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
   <app-stats-card
  [title]="'Total Notes'"
  [count]="store.totalNotes()"
/>

<app-stats-card
  [title]="'Learning'"
  [count]="store.learningNotes()"
/>

<app-stats-card
  [title]="'Personal'"
  [count]="store.personalNotes()"
/>

<app-stats-card
  [title]="'Work'"
  [count]="store.workNotes()"
/>
  </div>

  <app-search-bar
    (searchChanged)="onSearchChanged($event)"
  >
  </app-search-bar>

  <div class="text-cyan-400 text-sm">
    Search: {{ store.searchText() }}
  </div>

  <app-filter-bar
    [selectedCategory]="store.selectedCategory()"
    (categoryChanged)="store.selectedCategory.set($event)"
  >
  </app-filter-bar>

  <div class="text-violet-400 text-sm">
    Category:
    {{ store.selectedCategory() }}
  </div>

  @if (store.filteredNotes().length > 0) {

    <div
      class="grid
             grid-cols-1
             md:grid-cols-2
             xl:grid-cols-3
             gap-6"
    >
      @for (
        note of store.filteredNotes();
        track note.id
      ) {

        <app-note-card
  [note]="note"
  (deleteClicked)="deleteNote($event)"
/>

      }
    </div>

  } @else {

    <div
      class="rounded-3xl
             border border-dashed border-white/10
             bg-white/5
             backdrop-blur-xl
             p-16 text-center"
    >
      <h2 class="text-2xl font-semibold">
        No Notes Found
      </h2>

      <p class="text-slate-400 mt-2">
        Try another search or category.
      </p>
    </div>

  }

</div>
