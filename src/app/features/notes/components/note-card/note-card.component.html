<div
  class="rounded-3xl
         bg-white/5
         border border-white/10
         backdrop-blur-xl
         p-6
         hover:border-violet-500/40
         transition-all"
>

  <div
    class="flex items-center justify-between"
  >
    <span
      class="text-xs
             bg-violet-500/20
             text-violet-300
             px-3 py-1
             rounded-full"
    >
      {{ note().category }}
    </span>

    <div
      class="flex gap-2"
    >

      <button
        (click)="onEdit()"
        class="text-cyan-400
               hover:text-cyan-300
               text-sm"
      >
        Edit
      </button>

      <button
        (click)="onDelete()"
        class="text-red-400
               hover:text-red-300
               text-sm"
      >
        Delete
      </button>

    </div>

  </div>


  <h3
    class="text-xl font-semibold mt-4"
  >
    {{ note().title }}
  </h3>

  <p
    class="text-slate-400 mt-2 line-clamp-3"
  >
    {{ note().content }}
  </p>

</div>
