         border border-white/10
         backdrop-blur-xl
         p-6
         hover:border-violet-500/40
         transition-all"
>

  <div
    class="flex items-center justify-between"
  >

      class="text-xs
             bg-violet-500/20
             text-violet-300
             px-3 py-1

      {{ note().category }}

  <h3

  <p
